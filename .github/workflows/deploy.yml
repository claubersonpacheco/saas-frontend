name: Frontend CI/CD

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=https://api.organizarte.es \
            -t ghcr.io/claubersonpacheco/saas-frontend:latest .
          docker push ghcr.io/claubersonpacheco/saas-frontend:latest

      - name: Deploy Frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            cd "${{ secrets.DEPLOY_PATH }}"

            if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            fi

            SERVICE="${{ secrets.FRONTEND_SERVICE }}"
            if [ -z "$SERVICE" ]; then
              SERVICE="frontend"
            fi

            if docker compose version >/dev/null 2>&1; then
              docker compose pull "$SERVICE"
              docker compose up -d "$SERVICE"
            elif command -v docker-compose >/dev/null 2>&1; then
              docker-compose pull "$SERVICE"
              docker-compose up -d "$SERVICE"
            else
              echo "Docker Compose nao encontrado no servidor."
              exit 1
            fi

            docker image prune -f
