name: Frontend CI/CD

on:
  push:
    branches: ["master"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=https://api.micontrol.es \
            -t ghcr.io/claubersonpacheco/saas-frontend:latest .
          docker push ghcr.io/claubersonpacheco/saas-frontend:latest