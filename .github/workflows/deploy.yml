name: Frontend CI/CD

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: SaasFrontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login no GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build e Push da imagem
        run: |
          docker build \
            --build-arg VITE_API_URL=https://api.organizarte.es \
            -t ghcr.io/claubersonpacheco/saas-frontend:latest .

          docker push ghcr.io/claubersonpacheco/saas-frontend:latest

      - name: Verificar Secrets
        run: |
          echo "SSH_HOST..........: ${{ secrets.SSH_HOST != '' }}"
          echo "SSH_USER..........: ${{ secrets.SSH_USER != '' }}"
          echo "SSH_KEY...........: ${{ secrets.SSH_KEY != '' }}"
          echo "SSH_PORT..........: ${{ secrets.SSH_PORT != '' }}"
          echo "DEPLOY_PATH.......: ${{ secrets.DEPLOY_PATH != '' }}"
          echo "FRONTEND_SERVICE..: ${{ secrets.FRONTEND_SERVICE != '' }}"
          echo "GHCR_USERNAME.....: ${{ secrets.GHCR_USERNAME != '' }}"
          echo "GHCR_TOKEN........: ${{ secrets.GHCR_TOKEN != '' }}"

      - name: Deploy Frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e

            echo "===== DEBUG ====="
            echo "Usuário:"
            whoami

            echo
            echo "ID:"
            id

            echo
            echo "Grupos:"
            groups

            echo
            echo "Docker:"
            docker version

            echo
            echo "Docker Compose:"
            docker compose version

            echo
            echo "Diretório:"
            cd "${{ secrets.DEPLOY_PATH }}"
            pwd
            ls -la

            # Login no GHCR (somente se os secrets existirem)
            if [ -n "${{ secrets.GHCR_USERNAME }}" ] && [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
                -u "${{ secrets.GHCR_USERNAME }}" \
                --password-stdin
            fi

            SERVICE="${{ secrets.FRONTEND_SERVICE }}"

            if [ -z "$SERVICE" ]; then
              SERVICE="frontend"
            fi

            echo
            echo "Atualizando serviço: $SERVICE"

            docker compose pull "$SERVICE"
            docker compose up -d "$SERVICE"

            echo
            echo "Limpando imagens antigas..."
            docker image prune -f

            echo
            echo "Containers em execução:"
            docker compose ps

            echo
            echo "Deploy concluído com sucesso!"